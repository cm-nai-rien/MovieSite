<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaos Movie List</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap');

        :root {
            /* PRIMITIVES */
            --color-olive-dark:   #353308;
            --color-olive-medium: #5c5815;
            --color-olive-light:  #C6BF65;
            --color-pink:         #EECED3;
            --color-red:          #ff4757;
            --color-black:        #050505;
            --color-gray-dark:    #111111;
            --color-gray-medium:  #1a1a1a;
            --color-gray-light:   #333333;
            --color-gray-lighter: #888888;
            --color-white:        #ffffff;
            --color-white-dim:    #dddddd;

            /* TOKENS */
            --bg-page:        var(--color-gray-medium);
            --bg-card:        transparent; 
            --bg-featured:    var(--color-pink);
            --bg-ui:          var(--color-gray-dark);
            --bg-panel:       #fcfcfc; 
            --bg-overlay:     rgba(53, 51, 8, 0.85);
            
            --text-primary:   var(--color-pink);
            --text-inverted:  var(--color-gray-medium);
            --text-dim:       var--(color-pink);
            --text-accent:    var(--color-pink);
            --text-panel:     var(--color-gray-dark);

            --border-ui:      var(--color-olive-dark);
            --border-light:   #e0e0e0;
            
            --shadow-retro:   10px 10px 0px rgba(53, 51, 8, 0.2);
            --shadow-panel:   -5px 0 30px rgba(0,0,0,0.2);
            --shadow-card:    0 10px 20px rgba(0,0,0,0.1);
        }
        
        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-page);
            color: var(--text-primary);
            font-family: "Outfit", sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            width: 100%;
        }

        body.panel-open { overflow: hidden; }

        /* --- HEADER & NAV --- */
        .top-nav {
            display: flex;
            justify-content: flex-end;
            padding: 20px 5%;
            max-width: 1600px;
            margin: 0 auto;
        }

        .nav-link {
            color: var(--text-primary);
            text-transform: uppercase;
            font-family: 'Playfair Display', serif;
            font-weight: 300;
            font-style: italic;
            letter-spacing: 1px;
            border-bottom: 2px solid transparent;
            transition: 0.2s;
            text-decoration: none;
        }

        .nav-link:hover { border-bottom-color: var(--text-primary); }

        header {
            text-align: left;
            padding: 2rem 0 3rem;
            width: 90%;
            max-width: 1600px;
            margin: 0 auto;
        }

        h1 a {
            color: inherit;
            text-decoration: none;
        }
        h1 a:hover {
            opacity: 0.75;
        }

        h1 {
            font-family: 'Playfair Display', serif; 
            font-weight: 300;
            letter-spacing: -2px;
            margin: 0 0 10px 0;
            font-size: clamp(2rem, 6vw, 2.2rem);
        }   
        
        /* --- FEATURED SECTION --- */
        .featured-wrapper {
            max-width: 1600px;
            margin: 40px auto 100px auto;
            width: 90%; 
            background-color: var(--bg-featured);
            padding: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            color: var(--text-inverted);
        }

        .label-recent {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.5rem;
            margin-bottom: 30px;
            border-bottom: 1px groove var(--border-ui);
            display: inline-block;
            padding-bottom: 5px;
        }

        .featured-content { display: flex; gap: 50px; align-items: center; }
        .featured-poster {
            flex-shrink: 0; width: 12rem; overflow: hidden;
            box-shadow: var(--shadow-retro); transform: rotate(-2deg);
        }
        .featured-poster img { width: 100%; height: auto; display: block; }
        .featured-info { 
            visibility: visible;
        }
        .f-date { font-family: 'Outfit', sans-serif; font-size: 1rem; margin-bottom: 20px; display: inline-block; padding: 2px 10px;  }
        .f-title { font-family: 'Playfair Display', serif; font-size: 2.5rem; line-height: 1.1; margin: 0 0 8px 0; font-style: italic; }
        .f-rating { font-family: 'Outfit', sans-serif; font-size: 1rem; margin-bottom: 14px; display: inline-block; opacity: 0.8; }
        .f-notes { 
            max-width: 720px;
            font-family: 'Playfair Display', serif; font-size: 1.1rem; line-height: 1.6; position: relative; padding-left: 20px; border-left: 2px solid var(--color-olive-dark); }

        /* --- YEAR TABS --- */
        .tabs-container {
            display: flex;
            overflow-x: auto;
            padding: 0;
            margin-bottom: 0;
            max-width: 90%;
            align-items: flex-end;
        }
        .tabs-container::-webkit-scrollbar { display: none; }

        .tab-btn {
            background: transparent;
            border: 1px solid var(--border-ui);
            color: var(--text-primary);
            padding: 6px 15px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px; 
            font-weight: 300;
            cursor: pointer;
            opacity: 0.6;
            transition: all 0.2s;
            border-color: transparent;
        }

        .tab-btn:hover { opacity: 1; }
        .tab-btn.active {
            opacity: 1;
            background: var(--bg-featured);
            color: var(--text-inverted);
            font-weight: 400;
        }

        /* --- MAIN WRAPPER --- */
        .main-content-wrapper { margin: 0 auto 50px auto; width: 90%; max-width: 1600px; }

        /* --- CONTROL WRAPPER --- */
        .control-wrapper {
            display: flex;
            justify-content: space-between;
            width: 90%;
            max-width: 1600px;
            margin: 30px auto;
            flex-wrap: wrap;
        }

        /* --- CONTROL BAR --- */
        .control-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .filter-buttons { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

        .btn-search-toggle {
            background: transparent; border: 1px solid var(--border-ui);
            color: var(--text-primary); padding: 6px 10px;
            cursor: pointer; transition: all 0.2s; display: flex; align-items: center;
        }
        .btn-search-toggle:hover, .btn-search-toggle.active {
            background: var(--color-olive-dark); color: var(--color-white);
        }
        .btn-search-toggle svg { display: block; }

        .search-row {
            width: 90%; max-width: 1600px; margin: 0 auto 10px auto;
            animation: searchSlide 0.18s ease;
        }
        @keyframes searchSlide {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .search-bar-wrapper { position: relative; max-width: 360px; }
        .search-bar-wrapper input {
            width: 100%; padding: 7px 34px 7px 12px;
            background: transparent; border: 1px solid var(--border-ui);
            color: var(--text-primary); font-family: 'Outfit', sans-serif;
            font-size: 0.9rem; box-sizing: border-box; letter-spacing: 0.3px;
        }
        .search-bar-wrapper input::placeholder { color: var(--color-gray-lighter); }
        .search-bar-wrapper input:focus { outline: none; border-color: var(--color-olive-light); }
        .search-clear {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--color-gray-lighter);
            font-size: 1.1rem; cursor: pointer; padding: 0; line-height: 1; transition: 0.15s;
        }
        .search-clear:hover { color: var(--text-primary); }

        .btn-filter {
            background: transparent;
            border: 1px solid var(--border-ui);
            color: var(--text-primary);
            padding: 6px 15px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-filter:hover, .btn-filter.active { 
            background: var(--color-olive-dark); 
            color: var(--color-white); }

        .counter { font-family: 'Outfit', sans-serif; font-weight: 400; font-size: 1rem; }

        /* --- GRID --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(11rem, 1fr));
            gap: 2rem 1.5rem;
            padding-bottom: 100px;
        }

        .card { display: flex; flex-direction: column; background: transparent; gap: 12px;}

        .card-image-wrapper {
            position: relative; width: 100%; aspect-ratio: 2/3; overflow: hidden;
            background: var(--color-gray-medium); box-shadow: var(--shadow-card);
            transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer; 
        }
        .card img { width: 100%; height: 100%; object-fit: cover; display: block; }

        @media (hover: hover) {
            .card:hover .card-image-wrapper { transform: translateY(-5px); box-shadow: 0 20px 30px rgba(176, 176, 176, 0.15); }
            .card:hover .info { opacity: 1; }
        }

        .info {
            position: absolute; inset: 0; background: var(--bg-overlay); padding: 0.3rem;
            display: flex; flex-direction: column; justify-content: flex-start; align-items: flex-start;
            text-align: left; opacity: 0; transition: opacity 0.3s ease; backdrop-filter: blur(3px);
            color: var(--text-primary);
        }
        .info-date { font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 1rem; color: var(--color-pink); font-weight: bold; }
        .info-notes { font-family: 'Playfair Display', serif; font-style: italic; font-size: 0.95rem; line-height: 1.4; max-height: 80%; overflow-y: auto; }

        .info-notes-details { margin-top: 12px; }
        .card-title { font-family: 'Outfit', sans-serif; font-size: 0.9rem; line-height: 1.2; font-display: 500 ; color: var(--text-primary); margin-bottom: 4px; }
        .card-meta-row { font-family: 'Outfit', sans-serif; font-size: 0.8rem; font-weight: 200; display: flex; justify-content: space-between; align-items: center;  color: var(--text-dim);  margin-bottom: 4px; }
        .card-rating { font-family: 'Outfit', sans-serif; font-size: 0.8rem; font-weight: 200; color: var(--text-primary);  }
        .card-director { font-size: 0.8rem; color: var(--text-dim); font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: 0.7; }
        .card-watched { font-family: 'Outfit', sans-serif; font-size: 0.75rem; font-style: italic; font-weight: 200; color: var(--text-primary); text-align: right; opacity: 0.5; margin-top: 2px; }

        /* --- SIDE PANEL --- */
        .panel-backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 998; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .panel-backdrop.open { opacity: 1; pointer-events: all; }
        .side-panel { position: fixed; top: 0; right: 0; width: 400px; max-width: 85%; height: 100%; background: var(--bg-panel); color: var(--text-panel); z-index: 999; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.77, 0, 0.175, 1); box-shadow: var(--shadow-panel); display: flex; flex-direction: column; }
        .side-panel.open { transform: translateX(0); }
        .panel-header { padding: 20px 30px; border-bottom: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center; }
        .panel-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-style: italic; }
        .btn-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-panel); }
        .panel-content { flex-grow: 1; overflow-y: auto; padding: 0; }
        .panel-footer { padding: 20px 30px; border-top: 1px solid var(--border-light); display: flex; gap: 10px; }
        .btn-action { flex: 1; padding: 12px; border: 1px solid #222; background: transparent; text-transform: uppercase; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-action.primary { background: #222; color: #fff; }
        .btn-action:hover { opacity: 0.8; }

        /* ACCORDIONS */
        .accordion-item { border-bottom: 1px solid var(--border-light); }
        .accordion-header { padding: 20px 30px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-family: 'Outfit', sans-serif; font-weight: bold; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; }
        .accordion-header:hover { background: #f5f5f5; }
        .accordion-content { display: none; padding: 0 30px 20px 30px; max-height: 300px; overflow-y: auto; }
        .accordion-item.active .accordion-content { display: block; }
        .accordion-item.active .icon-plus { transform: rotate(45deg); }
        .icon-plus { transition: transform 0.3s; font-size: 1.2rem; }

        /* CHECKBOX */
        .checkbox-group { display: flex; flex-direction: column; gap: 12px; }
        .checkbox-label { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 0.95rem; color: #444; }
        .checkbox-label input { width: 18px; height: 18px; accent-color: var(--color-olive-dark); cursor: pointer; }

        .footer { background-color: var(--bg-page); padding: 3rem 2rem; color: var(--text-dim); font-size: 0.8rem; text-align: center;}

        @media (max-width: 800px) {
            h1 {font-size: clamp(2rem, 10vw, 3rem);}
            .featured-content { flex-direction: column; align-items: center; text-align: center; gap: 20px; }
            .control-wrapper { flex-direction: column; gap: 10px; align-items: flex-start; }
            .tabs-container { max-width: 100%; width: 100%; }
            .control-bar { flex-direction: column; align-items: flex-start; }
            .grid { grid-template-columns: repeat(2, 1fr); gap: 20px 10px; }
        }

        /* --- CARD MODAL --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.75);
            z-index: 1000; display: flex; align-items: center; justify-content: center;
            padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.25s;
        }
        .modal-overlay.open { opacity: 1; pointer-events: all; }

        .card-modal {
            background: var(--color-gray-dark); color: var(--text-primary);
            border: 1px solid var(--border-ui); max-width: 660px; width: 100%;
            max-height: 90vh; overflow-y: auto; position: relative;
            display: flex; gap: 28px; padding: 36px;
            transform: translateY(12px); transition: transform 0.25s;
        }
        .modal-overlay.open .card-modal { transform: translateY(0); }

        .modal-close-btn {
            position: absolute; top: 14px; right: 18px; background: none; border: none;
            font-size: 1.5rem; cursor: pointer; color: var(--text-primary);
            opacity: 0.5; line-height: 1; padding: 0; transition: opacity 0.15s;
        }
        .modal-close-btn:hover { opacity: 1; }

        .modal-poster { flex-shrink: 0; width: 110px; }
        .modal-poster img { width: 100%; height: auto; display: block; box-shadow: var(--shadow-retro); }

        .modal-body { flex: 1; min-width: 0; }

        .modal-watch-date {
            font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase;
            color: var(--color-olive-light); margin-bottom: 8px;
        }
        .modal-title {
            font-family: 'Playfair Display', serif; font-size: 1.5rem; font-style: italic;
            line-height: 1.2; margin-bottom: 6px;
        }
        .modal-sub {
            font-size: 0.85rem; color: var(--color-gray-lighter);
            margin-bottom: 20px; display: flex; gap: 10px;
        }
        .modal-notes-view {
            font-family: 'Playfair Display', serif; font-style: italic;
            font-size: 0.95rem; line-height: 1.65;
            border-left: 2px solid var(--color-olive-dark);
            padding-left: 14px; margin-bottom: 18px;
        }
        .modal-notes-view.empty { opacity: 0.35; }

        .btn-edit-note {
            background: transparent; border: 1px solid var(--border-ui);
            color: var(--text-primary); padding: 5px 14px;
            font-family: 'Outfit', sans-serif; font-size: 0.75rem;
            text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; opacity: 0.65; transition: 0.2s;
        }
        .btn-edit-note:hover { opacity: 1; background: var(--color-olive-dark); }

        .modal-edit-area { display: none; }
        .modal-edit-area textarea {
            width: 100%; background: var(--color-gray-medium);
            border: 1px solid var(--color-olive-dark); color: var(--text-primary);
            padding: 10px 12px; font-family: 'Playfair Display', serif;
            font-style: italic; font-size: 0.95rem; line-height: 1.6;
            resize: vertical; min-height: 90px; box-sizing: border-box;
            margin-bottom: 10px;
        }
        .modal-edit-area textarea:focus { outline: none; border-color: var(--color-olive-light); }

        .edit-rating-row {
            display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
            font-size: 0.8rem; color: var(--color-gray-lighter);
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .edit-rating-row input {
            width: 72px; background: var(--color-gray-medium);
            border: 1px solid var(--color-olive-dark); color: var(--text-primary);
            padding: 5px 8px; font-family: 'Outfit', sans-serif; font-size: 0.9rem;
        }
        .edit-rating-row input:focus { outline: none; border-color: var(--color-olive-light); }
        #edit-date-input { width: 160px; }

        .edit-action-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .btn-complete {
            background: var(--color-olive-dark); border: 1px solid var(--color-olive-dark);
            color: var(--color-white); padding: 7px 18px;
            font-family: 'Outfit', sans-serif; font-size: 0.75rem;
            text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.2s;
        }
        .btn-complete:hover { opacity: 0.8; }
        .btn-cancel-edit {
            background: transparent; border: 1px solid #444; color: var(--color-gray-lighter);
            padding: 7px 18px; font-family: 'Outfit', sans-serif; font-size: 0.75rem;
            text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.2s;
        }
        .btn-cancel-edit:hover { border-color: #888; color: var(--text-primary); }

        .modal-status { font-size: 0.8rem; color: var(--color-olive-light); min-height: 1.2em; }

        .btn-delete-movie {
            background: transparent; border: 1px solid #555; color: var(--color-gray-lighter);
            padding: 7px 18px; font-family: 'Outfit', sans-serif; font-size: 0.75rem;
            text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.2s;
            margin-left: auto;
        }
        .btn-delete-movie:hover { border-color: #ff4757; color: #ff4757; }

        .confirm-delete-row {
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
            margin-bottom: 10px; padding: 10px 12px;
            border: 1px solid #ff4757; background: rgba(255,71,87,0.08);
        }
        .confirm-delete-row span { font-size: 0.8rem; color: #ff6b6b; flex: 1; }
        .btn-confirm-delete {
            background: #ff4757; border: 1px solid #ff4757; color: #fff;
            padding: 5px 14px; font-family: 'Outfit', sans-serif; font-size: 0.75rem;
            text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.2s;
        }
        .btn-confirm-delete:hover { opacity: 0.8; }

        @media (max-width: 560px) {
            .card-modal { flex-direction: column; padding: 24px 20px; gap: 16px; }
            .modal-poster { width: 80px; }
        }
    </style>
</head>
<body>


    <header>
        <h1><a href="index.html">Chao's Movie List</a></h1>
        <a href="analytics.html" class="nav-link" style="float:right; margin-top:-40px;">Analytics</a>
    </header>

    <!-- FEATURED SECTION -->
    <div class="featured-wrapper" id="featured-section" style="display: none;">
        <div class="featured-content">
            <div class="featured-poster">
                <img id="f-img" src="" alt="Latest Movie">
            </div>
            <div class="featured-info">
                <div class="label-recent">Just Watched On</div>
                <div class="f-date" id="f-date"></div>
                <div class="f-title" id="f-title"></div>
                <div class="f-rating" id="f-rating"></div>
                <div class="f-notes" id="f-notes"></div>
            </div>
        </div>
    </div>

    <!-- YEAR TABS -->
    <div class="control-wrapper">
    <div class="tabs-container" id="year-tabs">
        <!-- Injected by JS -->
    </div>
    <div class="filter-buttons">
                <button class="btn-filter" onclick="openPanel('notes')">Notes</button>
                <button class="btn-filter" onclick="openPanel('type')">Type</button>
                <button class="btn-filter" onclick="openPanel('decade')">Decade</button>
                <button class="btn-filter" onclick="openPanel('country')">Country</button>
                <button class="btn-filter" onclick="openPanel('all')">All Filters</button>
                <button class="btn-search-toggle" id="btn-search-toggle" onclick="toggleSearch()" title="Search">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                </button>
    </div>
    </div>
    <div class="search-row" id="search-row" style="display:none">
        <div class="search-bar-wrapper">
            <input type="text" id="movie-search-input" placeholder="Search your movie list…" oninput="onMovieSearch()" autocomplete="off">
            <button class="search-clear" onclick="clearSearch()" title="Clear">×</button>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content-wrapper">
        
        <!-- CONTROL BAR -->
        <div class="control-bar">
            <div class="counter" id="count-display">0 Movies Watched</div>
        </div>

        <!-- GRID -->
        <div class="grid" id="movie-grid"></div>
    </div>

    <!-- SIDE PANEL -->
    <div class="panel-backdrop" id="backdrop" onclick="closePanel()"></div>
    <div class="side-panel" id="side-panel">
        <div class="panel-header">
            <div class="panel-title">Filters</div>
            <button class="btn-close" onclick="closePanel()">&times;</button>
        </div>
        <div class="panel-content">
            <!-- Sort -->
            <div class="accordion-item" id="acc-sort">
                <div class="accordion-header" onclick="toggleAccordion('acc-sort')">Sort By <span class="icon-plus">+</span></div>
                <div class="accordion-content">
                    <div class="checkbox-group" id="sort-options">
                        <label class="checkbox-label"><input type="radio" name="sort" value="date-new" checked onchange="applyFilters()"> Newest Watched</label>
                        <label class="checkbox-label"><input type="radio" name="sort" value="date-old" onchange="applyFilters()"> Oldest Watched</label>
                        <label class="checkbox-label"><input type="radio" name="sort" value="rate-high" onchange="applyFilters()"> Rating High → Low</label>
                        <label class="checkbox-label"><input type="radio" name="sort" value="rate-low" onchange="applyFilters()"> Rating Low → High</label>
                    </div>
                </div>
            </div>
            <!-- Notes -->
            <div class="accordion-item" id="acc-notes">
                <div class="accordion-header" onclick="toggleAccordion('acc-notes')">Notes <span class="icon-plus">+</span></div>
                <div class="accordion-content">
                    <div class="checkbox-group">
                        <label class="checkbox-label"><input type="checkbox" id="filter-notes" onchange="applyFilters()"> With Notes Only</label>
                    </div>
                </div>
            </div>
            <!-- Type -->
            <div class="accordion-item" id="acc-type">
                <div class="accordion-header" onclick="toggleAccordion('acc-type')">Type <span class="icon-plus">+</span></div>
                <div class="accordion-content">
                    <div class="checkbox-group">
                        <label class="checkbox-label"><input type="checkbox" class="filter-cb" data-category="type" value="movie" onchange="applyFilters()"> Movies</label>
                        <label class="checkbox-label"><input type="checkbox" class="filter-cb" data-category="type" value="tv" onchange="applyFilters()"> TV Series</label>
                    </div>
                </div>
            </div>
            <!-- Decade -->
            <div class="accordion-item" id="acc-decade">
                <div class="accordion-header" onclick="toggleAccordion('acc-decade')">Decade <span class="icon-plus">+</span></div>
                <div class="accordion-content"><div class="checkbox-group" id="container-decade"></div></div>
            </div>
            <!-- Country -->
            <div class="accordion-item" id="acc-country">
                <div class="accordion-header" onclick="toggleAccordion('acc-country')">Country <span class="icon-plus">+</span></div>
                <div class="accordion-content"><div class="checkbox-group" id="container-country"></div></div>
            </div>
        </div>
        <div class="panel-footer">
            <button class="btn-action" onclick="clearAllFilters()">Clear All</button>
            <button class="btn-action primary" onclick="closePanel()">Done</button>
        </div>
    </div>

    <!-- CARD MODAL -->
    <div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
        <div class="card-modal" onclick="event.stopPropagation()">
            <button class="modal-close-btn" onclick="closeModal()">&times;</button>
            <div class="modal-poster">
                <img id="modal-img" src="" alt="">
            </div>
            <div class="modal-body">
                <div class="modal-watch-date" id="modal-watch-date"></div>
                <div class="modal-title" id="modal-title"></div>
                <div class="modal-sub" id="modal-sub"></div>
                <div class="modal-notes-view" id="modal-notes-view"></div>
                <div class="modal-edit-area" id="modal-edit-area">
                    <textarea id="edit-notes-input" rows="4" placeholder="Add your notes…"></textarea>
                    <div class="edit-rating-row">
                        <span>Rating (0–10)</span>
                        <input type="number" id="edit-rating-input" step="0.5" min="0" max="10">
                    </div>
                    <div class="edit-rating-row">
                        <span>Watch Date</span>
                        <input type="date" id="edit-date-input">
                    </div>
                    <div class="edit-action-row">
                        <button class="btn-complete" onclick="saveEdit()">Complete</button>
                        <button class="btn-cancel-edit" onclick="cancelEdit()">Cancel</button>
                        <button class="btn-delete-movie" id="btn-delete-movie" onclick="promptDelete()">Delete</button>
                    </div>
                    <div class="confirm-delete-row" id="confirm-delete-row" style="display:none">
                        <span>Remove this movie permanently?</span>
                        <button class="btn-confirm-delete" onclick="deleteMovie()">Yes, Delete</button>
                        <button class="btn-cancel-edit" onclick="cancelDeletePrompt()">No</button>
                    </div>
                    <div class="modal-status" id="modal-status"></div>
                </div>
                <button class="btn-edit-note" id="btn-edit-note" onclick="enterEditMode()" style="display:none">Edit</button>
            </div>
        </div>
    </div>

    <div class="footer">
        <div>© 2026 Chao Wu</div>
        <div style="margin-top: 1rem; opacity: 0.5;">
            <a href="admin.html" style="color: inherit; text-decoration: none; font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase;">Admin Portal</a>
        </div>
    </div>

    <script>
        let allMovies = [];
        let filteredMovies = [];
        let currentYearMovies = [];
        let activeTabYear = null;

        const countryNames = new Intl.DisplayNames(['en'], { type: 'region' });

        fetch('movies.json')
            .then(r => r.json())
            .then(movies => {
                allMovies = movies.filter(m => m.poster);
                
                renderFeatured(allMovies); 
                setupTabs(allMovies);
                populateDynamicFilters();
                
                // Auto-select newest year
                const newestYear = [...new Set(allMovies.map(m => m.date_sort.substring(0,4)))].sort().reverse()[0];
                switchTab(newestYear);
            })
            .catch(err => console.error(err));

        function renderFeatured(movies) {
            if (movies.length === 0) return;
            const latestMovie = [...movies].sort((a,b) => b.date_sort.localeCompare(a.date_sort))[0];
            if (latestMovie) {
                document.getElementById('featured-section').style.display = 'block';
                document.getElementById('f-img').src = latestMovie.poster;
                const year = latestMovie.year && latestMovie.year !== 'Unknown' ? ` (${latestMovie.year})` : '';
                document.getElementById('f-title').innerText = latestMovie.title + year;
                document.getElementById('f-date').innerText = latestMovie.date_display;
                const ratingNum = getRating(latestMovie);
                document.getElementById('f-rating').innerText = ratingNum > 0 ? `★ ${latestMovie.rating} / 10` : '';
                let notes = latestMovie.review;
                if (!notes || notes === "nan") notes = "No notes added.";
                document.getElementById('f-notes').innerHTML = `&ldquo;${notes}&rdquo;`;
            }
        }

        function setupTabs(movies) {
            const container = document.getElementById('year-tabs');
            container.innerHTML = ''; 

            const allYears = [...new Set(movies.map(m => m.date_sort.substring(0,4)))].sort().reverse();
            
            // 1. Years > 2018
            const recentYears = allYears.filter(y => parseInt(y) > 2018 && y !== "0000");
            
            // 2. Older?
            const hasOlder = allYears.some(y => parseInt(y) <= 2018 && y !== "0000");

            recentYears.forEach(year => {
                const btn = document.createElement('button');
                btn.className = 'tab-btn';
                btn.innerText = year;
                btn.onclick = () => switchTab(year);
                btn.dataset.year = year;
                container.appendChild(btn);
            });

            if (hasOlder) {
                const btn = document.createElement('button');
                btn.className = 'tab-btn';
                btn.innerText = '2018 & Before';
                btn.onclick = () => switchTab('earlier');
                btn.dataset.year = 'earlier';
                container.appendChild(btn);
            }
        }

        function switchTab(tabId) {
            activeTabYear = tabId;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                if (btn.dataset.year === tabId) btn.classList.add('active');
                else btn.classList.remove('active');
            });

            if (tabId === 'earlier') {
                currentYearMovies = allMovies.filter(m => {
                    const y = parseInt(m.date_sort.substring(0,4));
                    return y <= 2018 && y !== 0;
                });
            } else {
                currentYearMovies = allMovies.filter(m => m.date_sort.startsWith(tabId));
            }

            // Reset sort to default
            document.querySelector('input[name="sort"][value="date-new"]').checked = true;
            
            applyFilters();
        }

        // --- PANEL & FILTER LOGIC ---
        const backdrop = document.getElementById('backdrop');
        const sidePanel = document.getElementById('side-panel');
        function getScrollbarWidth() { return window.innerWidth - document.documentElement.clientWidth; }
        function openPanel(targetSection) {
            document.body.style.paddingRight = `${getScrollbarWidth()}px`;
            document.body.classList.add('panel-open');
            backdrop.classList.add('open');
            sidePanel.classList.add('open');
            if (targetSection && targetSection !== 'all') {
                document.getElementById(`acc-${targetSection}`).classList.add('active');
            }
        }
        function closePanel() {
            document.body.style.paddingRight = '';
            document.body.classList.remove('panel-open');
            backdrop.classList.remove('open');
            sidePanel.classList.remove('open');
        }
        function toggleAccordion(id) { document.getElementById(id).classList.toggle('active'); }

        function populateDynamicFilters() {
            const decades = new Set();
            const countries = new Set();
            allMovies.forEach(m => {
                if (m.year && m.year !== "Unknown") {
                    const d = Math.floor(parseInt(m.year) / 10) * 10;
                    if (!isNaN(d)) decades.add(d);
                }
                if (m.country && m.country !== "Unknown") countries.add(m.country);
            });
            const decContainer = document.getElementById('container-decade');
            Array.from(decades).sort((a,b) => b - a).forEach(d => {
                decContainer.innerHTML += `<label class="checkbox-label"><input type="checkbox" class="filter-cb" data-category="decade" value="${d}" onchange="applyFilters()"> ${d}s</label>`;
            });
            const counContainer = document.getElementById('container-country');
            Array.from(countries).sort().forEach(c => {
                let name = c; try{name=countryNames.of(c);}catch{}
                counContainer.innerHTML += `<label class="checkbox-label"><input type="checkbox" class="filter-cb" data-category="country" value="${c}" onchange="applyFilters()"> ${name}</label>`;
            });
        }

        function clearAllFilters() {
            document.querySelectorAll('.filter-cb').forEach(cb => cb.checked = false);
            document.getElementById('filter-notes').checked = false;
            document.querySelector('input[name="sort"][value="date-new"]').checked = true;
            applyFilters();
        }

        function applyFilters() {
            const checkedTypes = Array.from(document.querySelectorAll('input[data-category="type"]:checked')).map(cb => cb.value);
            const checkedDecades = Array.from(document.querySelectorAll('input[data-category="decade"]:checked')).map(cb => cb.value);
            const checkedCountries = Array.from(document.querySelectorAll('input[data-category="country"]:checked')).map(cb => cb.value);
            const sortVal = document.querySelector('input[name="sort"]:checked').value;
            const notesChecked = document.getElementById('filter-notes').checked;

            filteredMovies = currentYearMovies.filter(m => {
                if (notesChecked) {
                    if (!m.review || m.review === "nan" || m.review.trim() === "") return false;
                }
                if (checkedTypes.length > 0 && !checkedTypes.includes(m.type)) return false;
                if (checkedCountries.length > 0 && !checkedCountries.includes(m.country)) return false;
                if (checkedDecades.length > 0) {
                    if (!m.year || m.year === "Unknown") return false;
                    const d = Math.floor(parseInt(m.year) / 10) * 10;
                    if (!checkedDecades.includes(d.toString())) return false;
                }
                return true;
            });

            filteredMovies.sort((a, b) => {
                if (sortVal === 'date-new') return b.date_sort.localeCompare(a.date_sort);
                if (sortVal === 'date-old') return a.date_sort.localeCompare(b.date_sort);
                if (sortVal === 'rate-high') return getRating(b) - getRating(a);
                if (sortVal === 'rate-low') {
                    const rateA = getRating(a) === 0 ? 100 : getRating(a);
                    const rateB = getRating(b) === 0 ? 100 : getRating(b);
                    return rateA - rateB;
                }
            });

            let labelText = activeTabYear;
            if (activeTabYear === 'earlier') labelText = "2018 & Before";

            document.getElementById('count-display').innerText = `${filteredMovies.length} movies`;
            
            // RENDER ALL AT ONCE
            const grid = document.getElementById('movie-grid');
            grid.innerHTML = ''; 
            renderGrid(filteredMovies, grid);
            
            updateButtonState('notes', notesChecked);
            updateButtonState('type', checkedTypes.length > 0);
            updateButtonState('decade', checkedDecades.length > 0);
            updateButtonState('country', checkedCountries.length > 0);
        }

        function updateButtonState(type, isActive) {
            const btn = document.querySelector(`button[onclick="openPanel('${type}')"]`);
            if(btn) {
                if(isActive) btn.classList.add('active');
                else btn.classList.remove('active');
            }
        }

        function formatDateDisplay(dateSort) {
            if (!dateSort || dateSort === '0000-00-00') return '';
            const [y, m, d] = dateSort.split('-').map(Number);
            return new Date(y, m - 1, d).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
        }

        function getRating(movie) {
            if (!movie.rating) return 0;
            const clean = movie.rating.toString().replace('/5', '');
            const num = parseFloat(clean);
            return isNaN(num) ? 0 : num;
        }

        function renderGrid(movies, grid) {
            movies.forEach(movie => {
                const el = document.createElement('div');
                el.className = 'card';
                let reviewText = (!movie.review || movie.review === "nan") ? "" : movie.review;
                const ratingNum = getRating(movie);
                const ratingDisplay = ratingNum > 0 ? `★ ${movie.rating}` : 'Unrated';
                const yearDisplay = (movie.year && movie.year !== "Unknown") ? movie.year : '';
                const directorDisplay = movie.director ? movie.director : '';

                el.innerHTML = `
                    <div class="card-image-wrapper">
                        <img src="${movie.poster}" alt="${movie.title}" loading="lazy">
                        <div class="info">
                            <div class="info-date">${movie.date_display}</div>
                            <div class="info-notes">${reviewText}</div>
                        </div>
                    </div>
                    <div class="card-details">
                        <div class="card-title">${movie.title}</div>
                        <div class="card-meta-row"><span>${yearDisplay}</span><span class="card-rating">${ratingDisplay}</span></div>
                        <div class="card-director">${directorDisplay}</div>
                        <div class="card-watched">${movie.date_display}</div>
                    </div>
                `;
                el.querySelector('.card-image-wrapper').addEventListener('click', () => openModal(movie));
                grid.appendChild(el);
            });
        }

        // --- MODAL ---
        const GITHUB_REPO = 'cm-nai-rien/MovieSite';
        const MOVIES_FILE = 'movies.json';
        const adminToken = sessionStorage.getItem('adminToken');
        let currentModalMovie = null;

        function openModal(movie) {
            currentModalMovie = movie;
            const notes = (!movie.review || movie.review === 'nan') ? '' : movie.review;
            const ratingNum = getRating(movie);
            const ratingDisplay = ratingNum > 0 ? `★ ${movie.rating}` : 'Unrated';
            const yearDisplay = (movie.year && movie.year !== 'Unknown') ? movie.year : '';
            const directorDisplay = movie.director ? ` · ${movie.director}` : '';

            document.getElementById('modal-img').src = movie.poster;
            document.getElementById('modal-img').alt = movie.title;
            document.getElementById('modal-watch-date').innerText = movie.date_display;
            document.getElementById('modal-title').innerText = movie.title;
            document.getElementById('modal-sub').innerText = [yearDisplay, ratingDisplay].filter(Boolean).join(' · ') + directorDisplay;

            const notesEl = document.getElementById('modal-notes-view');
            notesEl.innerText = notes || 'No notes added.';
            notesEl.classList.toggle('empty', !notes);

            document.getElementById('modal-edit-area').style.display = 'none';
            document.getElementById('modal-notes-view').style.display = 'block';
            document.getElementById('modal-status').innerText = '';
            document.getElementById('btn-edit-note').style.display = adminToken ? 'inline-block' : 'none';

            document.getElementById('modal-overlay').classList.add('open');
            document.body.classList.add('panel-open');
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('open');
            document.body.classList.remove('panel-open');
            currentModalMovie = null;
        }

        function enterEditMode() {
            const notes = (!currentModalMovie.review || currentModalMovie.review === 'nan') ? '' : currentModalMovie.review;
            document.getElementById('edit-notes-input').value = notes;
            document.getElementById('edit-rating-input').value = getRating(currentModalMovie) || '';
            const ds = currentModalMovie.date_sort;
            document.getElementById('edit-date-input').value = (ds && ds !== '0000-00-00') ? ds : '';
            document.getElementById('modal-notes-view').style.display = 'none';
            document.getElementById('btn-edit-note').style.display = 'none';
            document.getElementById('modal-edit-area').style.display = 'block';
            document.getElementById('modal-status').innerText = '';
            document.getElementById('confirm-delete-row').style.display = 'none';
            document.getElementById('btn-delete-movie').style.display = 'block';
            document.getElementById('edit-notes-input').focus();
        }

        function cancelEdit() {
            document.getElementById('modal-edit-area').style.display = 'none';
            document.getElementById('modal-notes-view').style.display = 'block';
            document.getElementById('btn-edit-note').style.display = adminToken ? 'inline-block' : 'none';
        }

        async function saveEdit() {
            const newNotes = document.getElementById('edit-notes-input').value.trim();
            const newRating = document.getElementById('edit-rating-input').value;
            const newDateSort = document.getElementById('edit-date-input').value;
            const newDateDisplay = formatDateDisplay(newDateSort);
            const statusEl = document.getElementById('modal-status');

            statusEl.innerText = 'Saving…';
            document.querySelector('.btn-complete').disabled = true;

            try {
                const getRes = await fetch(
                    `https://api.github.com/repos/${GITHUB_REPO}/contents/${MOVIES_FILE}`,
                    { headers: { Authorization: `token ${adminToken}` } }
                );
                if (!getRes.ok) throw new Error(`GitHub GET failed: ${getRes.status}`);
                const fileData = await getRes.json();
                const _b64 = fileData.content.replace(/\n/g, '');
                const _bytes = Uint8Array.from(atob(_b64), c => c.charCodeAt(0));
                const movies = JSON.parse(new TextDecoder('utf-8').decode(_bytes));

                const idx = movies.findIndex(m =>
                    m.title === currentModalMovie.title && m.date_sort === currentModalMovie.date_sort
                );
                if (idx !== -1) {
                    movies[idx].review = newNotes;
                    movies[idx].rating = newRating;
                    if (newDateSort) { movies[idx].date_sort = newDateSort; movies[idx].date_display = newDateDisplay; }
                }

                const newContent = btoa(unescape(encodeURIComponent(JSON.stringify(movies, null, 4))));
                const putRes = await fetch(
                    `https://api.github.com/repos/${GITHUB_REPO}/contents/${MOVIES_FILE}`,
                    {
                        method: 'PUT',
                        headers: { Authorization: `token ${adminToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            message: `Edit: ${currentModalMovie.title} notes`,
                            content: newContent,
                            sha: fileData.sha
                        })
                    }
                );
                if (!putRes.ok) {
                    const err = await putRes.json();
                    throw new Error(err.message || `GitHub PUT failed: ${putRes.status}`);
                }

                // Update local data so UI reflects immediately
                const oldDateSort = currentModalMovie.date_sort;
                const localIdx = allMovies.findIndex(m =>
                    m.title === currentModalMovie.title && m.date_sort === oldDateSort
                );
                currentModalMovie.review = newNotes;
                currentModalMovie.rating = newRating;
                if (newDateSort) { currentModalMovie.date_sort = newDateSort; currentModalMovie.date_display = newDateDisplay; }
                if (localIdx !== -1) {
                    allMovies[localIdx].review = newNotes;
                    allMovies[localIdx].rating = newRating;
                    if (newDateSort) { allMovies[localIdx].date_sort = newDateSort; allMovies[localIdx].date_display = newDateDisplay; }
                }
                if (newDateSort) document.getElementById('modal-watch-date').innerText = newDateDisplay;

                // Refresh notes view
                const notesEl = document.getElementById('modal-notes-view');
                notesEl.innerText = newNotes || 'No notes added.';
                notesEl.classList.toggle('empty', !newNotes);

                statusEl.innerText = '✓ Saved';
                setTimeout(() => {
                    cancelEdit();
                    statusEl.innerText = '';
                }, 800);

            } catch (e) {
                statusEl.innerText = `Error: ${e.message}`;
            } finally {
                document.querySelector('.btn-complete').disabled = false;
            }
        }

        function promptDelete() {
            document.getElementById('confirm-delete-row').style.display = 'flex';
            document.getElementById('btn-delete-movie').style.display = 'none';
            document.getElementById('modal-status').innerText = '';
        }

        function cancelDeletePrompt() {
            document.getElementById('confirm-delete-row').style.display = 'none';
            document.getElementById('btn-delete-movie').style.display = 'block';
        }

        async function deleteMovie() {
            const statusEl = document.getElementById('modal-status');
            const confirmRow = document.getElementById('confirm-delete-row');
            statusEl.innerText = 'Deleting…';
            confirmRow.style.display = 'none';

            try {
                const getRes = await fetch(
                    `https://api.github.com/repos/${GITHUB_REPO}/contents/${MOVIES_FILE}`,
                    { headers: { Authorization: `token ${adminToken}` } }
                );
                if (!getRes.ok) throw new Error(`GitHub GET failed: ${getRes.status}`);
                const fileData = await getRes.json();
                const _b64 = fileData.content.replace(/\n/g, '');
                const _bytes = Uint8Array.from(atob(_b64), c => c.charCodeAt(0));
                const movies = JSON.parse(new TextDecoder('utf-8').decode(_bytes));

                const idx = movies.findIndex(m =>
                    m.title === currentModalMovie.title && m.date_sort === currentModalMovie.date_sort
                );
                if (idx === -1) throw new Error('Movie not found in data.');
                movies.splice(idx, 1);

                const newContent = btoa(unescape(encodeURIComponent(JSON.stringify(movies, null, 4))));
                const putRes = await fetch(
                    `https://api.github.com/repos/${GITHUB_REPO}/contents/${MOVIES_FILE}`,
                    {
                        method: 'PUT',
                        headers: { Authorization: `token ${adminToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            message: `Delete: ${currentModalMovie.title}`,
                            content: newContent,
                            sha: fileData.sha
                        })
                    }
                );
                if (!putRes.ok) {
                    const err = await putRes.json();
                    throw new Error(err.message || `GitHub PUT failed: ${putRes.status}`);
                }

                // Remove from local arrays and re-render
                const localIdx = allMovies.findIndex(m =>
                    m.title === currentModalMovie.title && m.date_sort === currentModalMovie.date_sort
                );
                if (localIdx !== -1) allMovies.splice(localIdx, 1);

                closeModal();
                applyFilters();

            } catch (e) {
                statusEl.innerText = `Error: ${e.message}`;
                document.getElementById('btn-delete-movie').style.display = 'block';
            }
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                if (document.getElementById('modal-overlay').classList.contains('open')) {
                    closeModal();
                } else if (document.getElementById('search-row').style.display !== 'none') {
                    clearSearch();
                }
            }
        });

        // --- SEARCH ---
        let searchActive = false;

        function toggleSearch() {
            searchActive = !searchActive;
            const row = document.getElementById('search-row');
            const btn = document.getElementById('btn-search-toggle');
            if (searchActive) {
                row.style.display = 'block';
                document.getElementById('movie-search-input').focus();
                btn.classList.add('active');
            } else {
                clearSearch();
            }
        }

        function clearSearch() {
            document.getElementById('search-row').style.display = 'none';
            document.getElementById('movie-search-input').value = '';
            document.getElementById('btn-search-toggle').classList.remove('active');
            searchActive = false;
            applyFilters();
        }

        function onMovieSearch() {
            const query = document.getElementById('movie-search-input').value.trim().toLowerCase();
            if (!query) { applyFilters(); return; }
            const results = allMovies.filter(m => m.title && m.title.toLowerCase().includes(query));
            const grid = document.getElementById('movie-grid');
            grid.innerHTML = '';
            renderGrid(results, grid);
            document.getElementById('count-display').innerText =
                `${results.length} result${results.length !== 1 ? 's' : ''} for "${query}"`;
        }
    </script>
