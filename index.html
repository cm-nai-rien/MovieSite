<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaos Movie List</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap');

        :root {
            /* --- 1. PRIMITIVES --- */
            --color-olive-dark:   #353308;
            --color-olive-medium: #5c5815;
            --color-olive-light:  #C6BF65;
            --color-pink:         #EECED3;
            --color-red:          #ff4757;
            --color-black:        #050505;
            --color-gray-dark:    #111111;
            --color-gray-medium:  #1a1a1a;
            --color-gray-light:   #333333;
            --color-gray-lighter: #888888;
            --color-white:        #ffffff;
            --color-white-dim:    #dddddd;

            /* --- 2. TOKENS --- */
            --bg-page:        var(--color-olive-light);
            --bg-card:        var(--color-gray-medium);
            --bg-featured:    var(--color-pink);
            --bg-ui:          var(--color-gray-dark);
            --bg-panel:       #fcfcfc; /* Light panel like screenshot */
            --bg-overlay:     rgba(0, 0, 0, 0.75);
            
            --text-primary:   var(--color-olive-dark);
            --text-inverted:  var(--color-white);
            --text-dim:       var(--color-white-dim);
            --text-accent:    var(--color-pink);
            --text-panel:     #222; /* Dark text for light panel */
            
            --border-ui:      var(--color-olive-dark);
            --border-light:   #e0e0e0;
            
            --shadow-retro:   10px 10px 0px rgba(53, 51, 8, 0.2);
            --shadow-panel:   -5px 0 30px rgba(0,0,0,0.2);
        }
        
        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-page);
            color: var(--text-primary);
            font-family: 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden; /* Prevent horizontal scroll when panel opens */
        }

        body.panel-open {
            overflow: hidden; /* Lock scroll when panel is open */
        }

        /* --- HEADER --- */
        header {
            text-align: center;
            padding: 60px 20px 40px;
        }

        h1 {
            font-family: 'Playfair Display', serif; 
            font-weight: 500;
            font-size: 8rem;
            font-style: italic;
            letter-spacing: -3px;
            margin: 0 0 10px 0;
            background: linear-gradient(45deg, var(--color-olive-dark), var(--color-olive-medium));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }
        
        p.subtitle {
            font-family: 'Playfair Display', serif; 
            color: var(--text-primary);
            margin-top: 0;
            font-size: 1rem;
            margin-bottom: 30px;
        }

        /* --- FEATURED SECTION --- */
        .featured-wrapper {
            max-width: 90%;
            margin: 0 auto 50px auto;
            background-color: var(--bg-featured);
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            color: var(--text-primary);
        }

        .label-recent {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.5rem;
            margin-bottom: 30px;
            border-bottom: 1px groove var(--border-strong);
            display: inline-block;
            padding-bottom: 5px;
        }

        .featured-content {
            display: flex;
            gap: 50px;
            align-items: flex-start;
        }

        .featured-poster {
            flex-shrink: 0;
            width: 16rem;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: var(--shadow-retro);
            transform: rotate(-2deg);
        }

        .featured-poster img { width: 100%; height: auto; display: block; }
        .featured-info { flex-grow: 1; padding-top: 10px; }
        
        .f-date { font-family: 'Helvetica Neue', sans-serif; text-transform: uppercase; letter-spacing: 2px; font-size: 0.85rem; font-weight: bold; margin-bottom: 15px; opacity: 0.8; }
        .f-title { font-family: 'Playfair Display', serif; font-size: 3rem; line-height: 1; margin: 0 0 10px 0; font-style: italic; }
        .f-year { font-size: 1.5rem; font-style: italic; font-weight: bold; margin-bottom: 30px; display: inline-block; padding: 2px 10px; }
        .f-notes { font-family: 'Playfair Display', serif; font-size: 1.1rem; line-height: 1.6; position: relative; padding-left: 20px; border-left: 2px solid var(--color-olive-dark); }

        /* --- MAIN WRAPPER (Bar + Grid) --- */
        .main-content-wrapper {
            max-width: 90%;
            margin: 0 auto 50px auto;
        }

        /* --- CONTROL BAR --- */
        .control-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 10px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-filter {
            background: transparent;
            border: 1px solid var(--border-ui);
            color: var(--text-primary);
            padding: 8px 20px;
            border-radius: 50px;
            font-family: 'Helvetica Neue', sans-serif;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-filter:hover {
            background: var(--color-olive-dark);
            color: var(--color-white);
        }

        .btn-filter.active {
            background: var(--color-olive-dark);
            color: var(--color-white);
        }

        .counter {
            font-family: 'Playfair Display', serif;
            font-weight: bold;
            font-style: italic;
            font-size: 1.2rem;
        }

        /* --- GRID --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 2rem;
            padding-bottom: 100px;
        }

        .card {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            background: var(--bg-card);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            aspect-ratio: 2/3;
        }
        .card:hover { transform: scale(1.03) translateY(-5px); z-index: 10; }
        .card img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .info { position: absolute; inset: 0; background: var(--bg-overlay); padding: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; opacity: 0; transition: opacity 0.3s ease; backdrop-filter: blur(5px); color: var(--text-inverted); }
        .card:hover .info { opacity: 1; }
        
        .meta-date { font-size: 0.75rem; color: var(--text-accent); text-transform: uppercase; margin-bottom: 5px; }
        .meta-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 10px; color: var(--text-accent); font-family: 'Playfair Display', serif; font-style: italic; }
        .meta-review { font-size: 0.85rem; color: var(--text-dim); max-height: 50%; overflow-y: auto; font-style: italic; }
        .meta-tags-row { margin-top: auto; display: flex; gap: 5px; }
        .meta-tag { border: 1px solid var(--color-gray-lighter); padding: 3px 8px; border-radius: 10px; font-size: 0.7rem; background: rgba(0,0,0,0.5); }

        /* --- SIDE FILTER PANEL --- */
        .panel-backdrop {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 998;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        
        .panel-backdrop.open {
            opacity: 1;
            pointer-events: all;
        }

        .side-panel {
            position: fixed;
            top: 0; right: 0;
            width: 400px;
            max-width: 85%;
            height: 100%;
            background: var(--bg-panel);
            color: var(--text-panel);
            z-index: 999;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.77, 0, 0.175, 1);
            box-shadow: var(--shadow-panel);
            display: flex;
            flex-direction: column;
        }

        .side-panel.open {
            transform: translateX(0);
        }

        .panel-header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-style: italic;
        }

        .btn-close {
            background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-panel);
        }

        .panel-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 0;
        }

        .panel-footer {
            padding: 20px 30px;
            border-top: 1px solid var(--border-light);
            display: flex;
            gap: 10px;
        }

        .btn-action {
            flex: 1;
            padding: 12px;
            border: 1px solid #222;
            background: transparent;
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-action.primary { background: #222; color: #fff; }
        .btn-action:hover { opacity: 0.8; }

        /* ACCORDIONS */
        .accordion-item {
            border-bottom: 1px solid var(--border-light);
        }

        .accordion-header {
            padding: 20px 30px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Helvetica Neue', sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .accordion-header:hover { background: #f5f5f5; }

        .accordion-content {
            display: none;
            padding: 0 30px 20px 30px;
            max-height: 300px;
            overflow-y: auto;
        }

        .accordion-item.active .accordion-content { display: block; }
        .accordion-item.active .icon-plus { transform: rotate(45deg); }

        .icon-plus { transition: transform 0.3s; font-size: 1.2rem; }

        /* CHECKBOX STYLES */
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 0.95rem;
            color: #444;
        }

        .checkbox-label input {
            width: 18px; height: 18px;
            accent-color: var(--color-olive-dark);
            cursor: pointer;
        }

        @media (max-width: 800px) {
            h1 { font-size: 4rem; }
            .featured-content { flex-direction: column; align-items: center; text-align: center; gap: 20px; }
            .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Chao's Movie List</h1>
        <p class="subtitle">My visual archive of watched films 2009 - current</p>
    </header>

    <!-- NEW SECTION: MOST RECENT WATCH -->
    <div class="featured-wrapper" id="featured-section" style="display: none;">
        <div class="label-recent">Most Recently Watch</div>
        <div class="featured-content">
            <div class="featured-poster">
                <img id="f-img" src="" alt="Latest Movie">
            </div>
            <div class="featured-info">
                <div class="f-date" id="f-date"></div>
                <div class="f-title" id="f-title"></div>
                <div class="f-year" id="f-year"></div>
                <div class="f-notes" id="f-notes"></div>
            </div>
        </div>
    </div>

    <!-- MAIN SECTION WRAPPER -->
    <div class="main-content-wrapper">
        
        <!-- CONTROL BAR (Triggers) -->
        <div class="control-bar">
            <!-- Counter -->
            <div class="counter" id="count-display">0 Items</div>

            <!-- Filter Buttons -->
            <div class="filter-buttons">
                <button class="btn-filter" onclick="openPanel('all')">All Filters</button>
                <button class="btn-filter" onclick="openPanel('type')">Type</button>
                <button class="btn-filter" onclick="openPanel('decade')">Decade</button>
                <button class="btn-filter" onclick="openPanel('country')">Country</button>
            </div>
        </div>

        <!-- GRID -->
        <div class="grid" id="movie-grid"></div>
    </div>

    <!-- SIDE PANEL COMPONENT -->
    <div class="panel-backdrop" id="backdrop" onclick="closePanel()"></div>
    <div class="side-panel" id="side-panel">
        <div class="panel-header">
            <div class="panel-title">Filters</div>
            <button class="btn-close" onclick="closePanel()">&times;</button>
        </div>

        <div class="panel-content">
            
            <!-- Sort Section (Radio) -->
            <div class="accordion-item" id="acc-sort">
                <div class="accordion-header" onclick="toggleAccordion('acc-sort')">
                    Sort By <span class="icon-plus">+</span>
                </div>
                <div class="accordion-content">
                    <div class="checkbox-group" id="sort-options">
                        <label class="checkbox-label"><input type="radio" name="sort" value="date-new" checked onchange="applyFilters()"> Newest First</label>
                        <label class="checkbox-label"><input type="radio" name="sort" value="date-old" onchange="applyFilters()"> Oldest First</label>
                        <label class="checkbox-label"><input type="radio" name="sort" value="rate-high" onchange="applyFilters()"> Rating High → Low</label>
                        <label class="checkbox-label"><input type="radio" name="sort" value="rate-low" onchange="applyFilters()"> Rating Low → High</label>
                    </div>
                </div>
            </div>

            <!-- Type Section (Checkbox) -->
            <div class="accordion-item" id="acc-type">
                <div class="accordion-header" onclick="toggleAccordion('acc-type')">
                    Type <span class="icon-plus">+</span>
                </div>
                <div class="accordion-content">
                    <div class="checkbox-group">
                        <label class="checkbox-label"><input type="checkbox" class="filter-cb" data-category="type" value="movie" onchange="applyFilters()"> Movies</label>
                        <label class="checkbox-label"><input type="checkbox" class="filter-cb" data-category="type" value="tv" onchange="applyFilters()"> TV Series</label>
                    </div>
                </div>
            </div>

            <!-- Decade Section (Dynamic Checkbox) -->
            <div class="accordion-item" id="acc-decade">
                <div class="accordion-header" onclick="toggleAccordion('acc-decade')">
                    Decade <span class="icon-plus">+</span>
                </div>
                <div class="accordion-content">
                    <div class="checkbox-group" id="container-decade">
                        <!-- JS injects here -->
                    </div>
                </div>
            </div>

            <!-- Country Section (Dynamic Checkbox) -->
            <div class="accordion-item" id="acc-country">
                <div class="accordion-header" onclick="toggleAccordion('acc-country')">
                    Country <span class="icon-plus">+</span>
                </div>
                <div class="accordion-content">
                    <div class="checkbox-group" id="container-country">
                        <!-- JS injects here -->
                    </div>
                </div>
            </div>

        </div>

        <div class="panel-footer">
            <button class="btn-action" onclick="clearAllFilters()">Clear All</button>
            <button class="btn-action primary" onclick="closePanel()">Done</button>
        </div>
    </div>

    <script>
        let allMovies = [];
        const countryNames = new Intl.DisplayNames(['en'], { type: 'region' });

        // --- LOAD DATA ---
        fetch('movies.json')
            .then(r => r.json())
            .then(movies => {
                allMovies = movies.filter(m => m.poster);
                renderFeatured(allMovies);
                populateDynamicFilters(); // Build the checkboxes
                applyFilters(); // Initial render
            })
            .catch(err => console.error(err));

        // --- FEATURED LOGIC ---
        function renderFeatured(movies) {
            if (movies.length === 0) return;
            const latestMovie = [...movies].sort((a,b) => b.date_sort.localeCompare(a.date_sort))[0];
            if (latestMovie) {
                document.getElementById('featured-section').style.display = 'block';
                document.getElementById('f-img').src = latestMovie.poster;
                document.getElementById('f-title').innerText = latestMovie.title;
                document.getElementById('f-date').innerText = "WATCHED " + latestMovie.date_display;
                document.getElementById('f-year').innerText = latestMovie.year || "";
                let notes = latestMovie.review;
                if (!notes || notes === "nan") notes = "No notes added.";
                document.getElementById('f-notes').innerHTML = `&ldquo;${notes}&rdquo;`;
            }
        }

        // --- PANEL LOGIC ---
        const backdrop = document.getElementById('backdrop');
        const sidePanel = document.getElementById('side-panel');

        function openPanel(targetSection) {
            document.body.classList.add('panel-open');
            backdrop.classList.add('open');
            sidePanel.classList.add('open');

            // Close all first
            document.querySelectorAll('.accordion-item').forEach(el => el.classList.remove('active'));

            // Open specific if requested
            if (targetSection === 'all') {
                // Keep all closed or maybe open the first one? Let's keep closed for cleanness
            } else if (targetSection) {
                const targetEl = document.getElementById(`acc-${targetSection}`);
                if (targetEl) targetEl.classList.add('active');
            }
        }

        function closePanel() {
            document.body.classList.remove('panel-open');
            backdrop.classList.remove('open');
            sidePanel.classList.remove('open');
        }

        function toggleAccordion(id) {
            const item = document.getElementById(id);
            // Toggle active state
            if(item.classList.contains('active')) {
                item.classList.remove('active');
            } else {
                // Optional: Close others? For multiselect UI, usually we allow multiple open
                // But to save space, let's close others
                document.querySelectorAll('.accordion-item').forEach(el => el.classList.remove('active'));
                item.classList.add('active');
            }
        }

        // --- POPULATE FILTERS ---
        function populateDynamicFilters() {
            const decades = new Set();
            const countries = new Set();

            allMovies.forEach(m => {
                if (m.year && m.year !== "Unknown") {
                    const d = Math.floor(parseInt(m.year) / 10) * 10;
                    if (!isNaN(d)) decades.add(d);
                }
                if (m.country && m.country !== "Unknown") countries.add(m.country);
            });

            // Decades (Newest first)
            const decContainer = document.getElementById('container-decade');
            Array.from(decades).sort((a,b) => b - a).forEach(d => {
                decContainer.innerHTML += `
                    <label class="checkbox-label">
                        <input type="checkbox" class="filter-cb" data-category="decade" value="${d}" onchange="applyFilters()">
                        ${d}s
                    </label>`;
            });

            // Countries (A-Z)
            const counContainer = document.getElementById('container-country');
            Array.from(countries).sort().forEach(c => {
                const name = getCountryName(c);
                counContainer.innerHTML += `
                    <label class="checkbox-label">
                        <input type="checkbox" class="filter-cb" data-category="country" value="${c}" onchange="applyFilters()">
                        ${name}
                    </label>`;
            });
        }

        function getCountryName(code) {
            try { return countryNames.of(code); } catch { return code; }
        }

        function clearAllFilters() {
            // Uncheck all checkboxes
            document.querySelectorAll('.filter-cb').forEach(cb => cb.checked = false);
            // Reset Sort to default
            document.querySelector('input[name="sort"][value="date-new"]').checked = true;
            applyFilters();
        }

        // --- FILTER ENGINE ---
        function applyFilters() {
            // 1. Get Selected Values
            const checkedTypes = Array.from(document.querySelectorAll('input[data-category="type"]:checked')).map(cb => cb.value);
            const checkedDecades = Array.from(document.querySelectorAll('input[data-category="decade"]:checked')).map(cb => cb.value);
            const checkedCountries = Array.from(document.querySelectorAll('input[data-category="country"]:checked')).map(cb => cb.value);
            const sortVal = document.querySelector('input[name="sort"]:checked').value;

            // 2. Filter Array
            let filtered = allMovies.filter(m => {
                // Type Logic (OR)
                if (checkedTypes.length > 0 && !checkedTypes.includes(m.type)) return false;
                
                // Country Logic (OR)
                if (checkedCountries.length > 0 && !checkedCountries.includes(m.country)) return false;

                // Decade Logic (OR)
                if (checkedDecades.length > 0) {
                    if (!m.year || m.year === "Unknown") return false;
                    const d = Math.floor(parseInt(m.year) / 10) * 10;
                    if (!checkedDecades.includes(d.toString())) return false;
                }
                return true;
            });

            // 3. Sort
            filtered.sort((a, b) => {
                if (sortVal === 'date-new') return b.date_sort.localeCompare(a.date_sort);
                if (sortVal === 'date-old') return a.date_sort.localeCompare(b.date_sort);
                if (sortVal === 'rate-high') return getRating(b) - getRating(a);
                if (sortVal === 'rate-low') {
                    const rateA = getRating(a) === 0 ? 100 : getRating(a);
                    const rateB = getRating(b) === 0 ? 100 : getRating(b);
                    return rateA - rateB;
                }
            });

            // 4. Render
            document.getElementById('count-display').innerText = `${filtered.length} Items`;
            renderGrid(filtered);
            
            // 5. Update Active States on Buttons
            updateButtonState('type', checkedTypes.length > 0);
            updateButtonState('decade', checkedDecades.length > 0);
            updateButtonState('country', checkedCountries.length > 0);
        }

        function updateButtonState(type, isActive) {
            // Helper to make buttons look "filled" when filters are active
            const btn = document.querySelector(`button[onclick="openPanel('${type}')"]`);
            if(btn) {
                if(isActive) btn.classList.add('active');
                else btn.classList.remove('active');
            }
        }

        function getRating(movie) {
            if (!movie.rating) return 0;
            const clean = movie.rating.toString().replace('/5', '');
            const num = parseFloat(clean);
            return isNaN(num) ? 0 : num;
        }

        function renderGrid(movies) {
            const grid = document.getElementById('movie-grid');
            grid.innerHTML = ''; 
            movies.forEach(movie => {
                const el = document.createElement('div');
                el.className = 'card';
                let reviewText = (!movie.review || movie.review === "nan") ? "" : movie.review;
                const ratingNum = getRating(movie);
                const ratingHtml = ratingNum > 0 ? `<span class="meta-tag">★ ${movie.rating}</span>` : '';
                const yearHtml = (movie.year && movie.year !== "Unknown") ? `<span class="meta-tag">${movie.year}</span>` : '';

                el.innerHTML = `
                    <img src="${movie.poster}" alt="${movie.title}" loading="lazy">
                    <div class="info">
                        <div class="meta-date">${movie.date_display}</div>
                        <div class="meta-title">${movie.title}</div>
                        <div class="meta-review">"${reviewText}"</div>
                        <div class="meta-tags-row">${ratingHtml} ${yearHtml}</div>
                    </div>
                `;
                grid.appendChild(el);
            });
        }
    </script>
</body>
</html>
