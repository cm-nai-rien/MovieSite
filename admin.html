<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaos Admin</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap');

        :root {
            --bg: #1a1a1a;
            --text: #f0f0f0;
            --accent: #C6BF65;
            --input-bg: #2a2a2a;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: "Outfit", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* --- LOGIN SCREEN --- */
        #login-screen {
            text-align: center;
        }

        /* --- ADMIN PANEL --- */
        #admin-panel {
            display: none; /* Hidden by default */
            width: 600px;
            max-width: 90%;
            background: #222;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .access-btn-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--accent);
            margin-top: 0;
            text-align: center;
        }

        .form-group { margin-bottom: 20px; }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: #353308;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
        }

        button:hover { opacity: 0.9; }

        /* PREVIEW SECTION */
        .preview {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }
        .preview img { width: 80px; border-radius: 4px; }
        .preview-info { display: flex; flex-direction: column; justify-content: center; }
        .preview-title { font-weight: bold; font-size: 1.1rem; }
        .preview-meta { font-size: 0.9rem; color: #888; }

        /* CODE BOX */
        .code-box {
            margin-top: 20px;
            background: #111;
            padding: 15px;
            font-family: monospace;
            color: #0f0;
            border-radius: 8px;
            word-break: break-all;
            font-size: 0.8rem;
            display: none;
            cursor: pointer;
            border: 1px dashed #444;
        }
        .code-box:hover { background: #000; border-color: #0f0; }
        .copy-hint { text-align: center; font-size: 0.8rem; color: #666; margin-top: 5px; }

    </style>
</head>
<body>

    <!-- 1. LOGIN SCREEN -->
    <div id="login-screen">
        <h1>Chaos Movie Portal</h1>
    <div class="access-btn-group">
        <input type="password" id="password-input" placeholder="Enter Secret Key" style="text-align: center; width: 200px;">
        <button onclick="checkAccess()" style="width: 200px; margin-top: 20px;">Enter</button>
        <p id="error-msg" style="color: var(--color-red); display: none; margin-top: 10px;">Access Denied</p>
    </div>
    </div>

    <!-- 2. ADMIN PANEL -->
    <div id="admin-panel">
        <h1>Add New Movie</h1>
        
        <div class="form-group">
            <label>TMDB Link (Movie or TV) *</label>
            <input type="text" id="tmdb-link" placeholder="https://www.themoviedb.org/movie/..." onchange="fetchMetadata()" required>
        </div>

        <div class="form-group">
            <label>Watched Date*</label>
            <input type="date" id="watch-date" required>
        </div>

        <div class="form-group">
            <label>Rating (0-10)*</label>
            <input type="number" id="rating" step="0.5" max="10" value="5" required>
        </div>

        <div class="form-group">
            <label>Notes / Review</label>
            <textarea id="notes" rows="3"></textarea>
        </div>

        <!-- Preview Area -->
        <div id="preview-area" class="preview" style="display:none;">
            <img id="p-poster" src="">
            <div class="preview-info">
                <div id="p-title" class="preview-title"></div>
                <div class="preview-meta">
                    <span id="p-year"></span> • <span id="p-country"></span>
                </div>
            </div>
        </div>

        <button onclick="generateCSV()" id="gen-btn" style="display:none;">Generate CSV Data</button>

        <div id="result-box" class="code-box" onclick="copyToClipboard()">
            <!-- Result goes here -->
        </div>
        <div class="copy-hint" id="copy-hint" style="display:none;">Click box to copy to clipboard</div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const SECRET_KEY = "chaos"; // <--- CHANGE THIS TO YOUR PASSWORD
        const API_KEY = 'd8a1d72438cc3042bcfb451bd4ef1a07'; // <--- PASTE YOUR TMDB API KEY HERE

        // 1. AUTHENTICATION
        function checkAccess() {
            const input = document.getElementById('password-input').value;
            if(input === SECRET_KEY) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                
                // Set default date to today
                document.getElementById('watch-date').valueAsDate = new Date();
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        // 2. FETCH METADATA
        let fetchedData = {};

        async function fetchMetadata() {
            const link = document.getElementById('tmdb-link').value;
            const match = link.match(/themoviedb\.org\/(movie|tv)\/(\d+)/);

            if (match && API_KEY) {
                const type = match[1];
                const id = match[2];
                const url = `https://api.themoviedb.org/3/${type}/${id}?api_key=${API_KEY}`;

                try {
                    const response = await fetch(url);
                    const data = await response.json();

                    // Save for generation
                    fetchedData.title = data.title || data.name;
                    fetchedData.year = (data.release_date || data.first_air_date || "").substring(0,4);
                    fetchedData.poster = `https://image.tmdb.org/t/p/w200${data.poster_path}`;
                    fetchedData.link = link;

                    // Show Preview
                    document.getElementById('p-poster').src = fetchedData.poster;
                    document.getElementById('p-title').innerText = fetchedData.title;
                    document.getElementById('p-year').innerText = fetchedData.year;
                    document.getElementById('preview-area').style.display = 'flex';
                    document.getElementById('gen-btn').style.display = 'block';

                } catch (e) {
                    console.error(e);
                    alert("Could not fetch data. Check API Key or Link.");
                }
            }
        }

        // 3. GENERATE CSV STRING
        function generateCSV() {
            // Data from inputs
            const dateVal = document.getElementById('watch-date').value;
            // Convert 2025-11-21 to November 21, 2025
            const dateObj = new Date(dateVal);
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            const formattedDate = dateObj.toLocaleDateString('en-US', options);

            const rating = document.getElementById('rating').value;
            const notes = document.getElementById('notes').value.replace(/"/g, '""'); // Escape quotes
            
            // CSV Order based on your python script logic:
            // Name, Empty, Date, Director, Notes, Rate, Year, TMDB Link
            // Note: We put Title in col 1, leave col 2 empty as per your script fix
            
            const csvLine = `"${fetchedData.title}",,"${formattedDate}",,"${notes}",${rating},${fetchedData.year},${fetchedData.link}`;

            const box = document.getElementById('result-box');
            box.innerText = csvLine;
            box.style.display = 'block';
            document.getElementById('copy-hint').style.display = 'block';
        }

        // 4. COPY
        function copyToClipboard() {
            const text = document.getElementById('result-box').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert("Copied! Now paste it into the bottom of chaosmovielist.csv");
            });
        }
    </script>
</body>
</html>
